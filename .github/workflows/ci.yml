name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run --filter '@runloop/remote-agents-sdk' check

      - name: Build
        run: bun run build

      - name: Typecheck examples
        run: bun run --filter '@runloop/example-*' typecheck

      - name: Build examples
        run: |
          bun run --filter '@runloop/example-combined-app' build

      - name: Test with coverage
        run: bun run --filter '@runloop/remote-agents-sdk' test:coverage

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          directory: sdk/coverage
          flags: sdk
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Security audit
        run: npm audit --omit=dev || true
        working-directory: sdk
