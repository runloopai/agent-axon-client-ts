name: Smoke Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  statuses: write

jobs:
  trigger-smoke-tests:
    if: startsWith(github.head_ref, 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - name: Set pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'smoke-tests',
              description: 'Smoke tests running in agent-axon-client-smoke-tests…',
              target_url: 'https://github.com/runloopai/agent-axon-client-smoke-tests/actions'
            });

      - name: Trigger smoke tests
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SMOKE_TEST_PAT }}
          repository: runloopai/agent-axon-client-smoke-tests
          event-type: smoke-test
          client-payload: >-
            {
              "sdk_version": "branch:${{ github.head_ref }}",
              "environment": "both",
              "triggered_by": "${{ github.repository }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "commit_sha": "${{ github.event.pull_request.head.sha }}"
            }
